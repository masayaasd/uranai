<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0c1018">
    <title>診断データ一覧</title>
    <link rel="stylesheet" href="/records.css">
  </head>
  <body>
    <main class="records-shell">
      <header class="records-header">
        <div>
          <p class="eyebrow">LINE Harness</p>
          <h1>診断データ一覧</h1>
        </div>
        <a class="back-link" href="/">診断ページへ</a>
      </header>

      <section class="control-panel">
        <label>
          <span>閲覧キー</span>
          <input id="adminKey" type="password" autocomplete="off" placeholder="LハーネスAPIキーまたは閲覧キー">
        </label>
        <label>
          <span>検索</span>
          <input id="searchText" type="search" placeholder="LINE名で検索">
        </label>
        <label>
          <span>表示件数</span>
          <select id="limitSelect">
            <option value="50">50件</option>
            <option value="100" selected>100件</option>
            <option value="200">200件</option>
          </select>
        </label>
        <div class="button-row">
          <button id="loadButton" type="button">読み込み</button>
          <button id="csvButton" type="button" class="secondary">CSV</button>
        </div>
      </section>

      <section class="status-row" aria-live="polite">
        <span id="statusText">閲覧キーを入力して読み込んでください。</span>
        <div class="pager">
          <button id="prevButton" type="button" disabled>前へ</button>
          <button id="nextButton" type="button" disabled>次へ</button>
        </div>
      </section>

      <section class="table-frame">
        <table>
          <thead>
            <tr>
              <th>LINE名</th>
              <th>タグ</th>
              <th>流入</th>
              <th>診断タイプ</th>
              <th>年代</th>
              <th>都道府県</th>
              <th>悩み</th>
              <th>年収</th>
              <th>自由記入</th>
              <th>完了日時</th>
              <th>LINE userId</th>
              <th>友だちID</th>
            </tr>
          </thead>
          <tbody id="recordsBody">
            <tr>
              <td colspan="12" class="empty-cell">データ未読み込み</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/records.js"></script>
  </body>
</html>
