<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0c1018">
    <meta name="description" content="生年月日と質問から龍神金運タイプを診断するスマホ特化型の無料鑑定体験です。">
    <title>龍神金運タイプ診断</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <canvas class="aura-canvas" id="auraCanvas" aria-hidden="true"></canvas>
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="brand" href="#home" aria-label="龍神金運タイプ診断 ホーム">
          <span class="brand-mark" aria-hidden="true">龍</span>
          <span>
            <strong>龍神金運タイプ診断</strong>
            <small>あなた専用 龍神金運鑑定</small>
          </span>
        </a>
      </header>

      <main id="app" aria-live="polite"></main>

      <footer class="site-footer">
        <button type="button" data-legal="privacy">プライバシーポリシー</button>
        <button type="button" data-legal="terms">利用規約</button>
        <button type="button" data-legal="commerce">特商法表記</button>
        <button type="button" data-route="admin">管理</button>
      </footer>
    </div>

    <div class="modal" id="legalModal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="legalTitle">
        <button class="icon-button modal-close" type="button" aria-label="閉じる" data-close-modal>×</button>
        <h2 id="legalTitle"></h2>
        <div id="legalBody" class="legal-copy"></div>
      </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
  </body>
</html>
